   <div id="box">

    <p></p>

   </div>

   <!-- 2 div.box>li>ui  -->
    <div class="box">
    <li>
        <ul></ul>
    </li>
   </div>

   <!-- 3 div+p+bq  -->
    <div></div>
    <p></p>

    <!-- 4 div+div>p>span+em^bq  -->
    <div></div>
    <div>
        <p><span></span><em></em></p>
        <blockquote></blockquote>
    </div>

    <!-- 5 ul>li*5  -->
    <ul>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>

    <!-- grouping -->
    <!-- 6 div>header>ul>li*2  -->
    <div>
        <header>
            <ul>
                <li></li>
                <li></li>
            </ul>
        </header>
    </div>

 <!-- id and class  -->
 <!-- 7 div#heade.page  -->
 <div id="heade" class="page"></div>
 <!-- div#heade+div.page  -->
 <div id="heade"></div>
 <div class="page"></div>

 <!-- costume attribute  -->
 <!-- 8 td[title="hello word"]  -->
 <td title="hello word"></td>

 <!-- item number  -->
 <!-- 9 ul>li.item$*5  -->
 <ul>
    <li class="item1"></li>
    <li class="item2"></li>
    <li class="item3"></li>
    <li class="item4"></li>
    <li class="item5"></li>
 </ul>
 <!-- li.item$*5  -->
 <li class="item1"></li>
 <li class="item2"></li>
 <li class="item3"></li>
 <li class="item4"></li>
 <li class="item5"></li>
 <li class="item6"></li>

 <!-- td.part$*5>{hello}  -->
 <td class="part1">hello1</td>
 <td class="part2">hello2</td>
 <td class="part3">hello3</td>
 <td class="part4">hello4</td>
 <td class="part5">hello5</td>

 <!-- #page>(#header>ul#nav>li*4>a)+(#content>h1{hello woed}+p)+#footer  -->
 <div id="page">
    <div id="header">
        <ul id="nav">

    <div id="content">

        <p></p>
    </div>
    <div id="footer"></div>
 </div>
